name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            game_path: 'C:/Program Files (x86)/Steam/steamapps/common/Slay the Spire 2'
            data_dir: '${{ github.event.inputs.game_path }}/data_sts2_windows_x86_64'
          - os: ubuntu-latest
            game_path: '$HOME/.steam/steam/steamapps/common/Slay the Spire 2'
            data_dir: '${{ github.event.inputs.game_path }}/data_sts2_linux_x86_64'
          - os: macos-latest
            game_path: '$HOME/Library/Application Support/Steam/steamapps/common/Slay the Spire 2'
            data_dir: '${{ github.event.inputs.game_path }}/SlayTheSpire2.app/Contents/Resources/data_sts2_macos_universal'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release
        env:
          STS2GamePath: ${{ matrix.game_path }}
          GameDataDir: ${{ matrix.data_dir }}

      - name: Create release artifact
        run: |
          mkdir -p release
          cp bin/Release/net9.0/*.dll release/ || true
          cp bin/Release/net9.0/*.pdb release/ || true
          cp sts2mcp.json release/
          cd release
          if [ -f *.dll ]; then
            7z a ../sts2mcp-${{ runner.os }}.zip *
          else
            echo "No DLLs built - game files may not be present"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2mcp-${{ runner.os }}
          path: sts2mcp-*.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
